<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | DriveX</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.55),
    rgba(0,0,0,.55)),
    url('images/hero-car.jpg');
    background-size:cover;
    background-position:center;
}

/* Navbar */

nav{
    background:#0F172A;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#fff;
    font-size:30px;
    font-weight:bold;
}

.logo i{
    color:#FF6B00;
}

nav ul{
    list-style:none;
    display:flex;
    gap:30px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:17px;
}

nav ul li a:hover{
    color:#FF6B00;
}

/* Login Section */

.login-section{
    min-height:88vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.login-box{
    width:420px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(20px);
    padding:40px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
    color:#fff;
}

.login-box h1{
    text-align:center;
    margin-bottom:10px;
}

.login-box p{
    text-align:center;
    margin-bottom:35px;
    color:#ddd;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:10px;
}

.input-box input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    outline:none;
}

.options{
    display:flex;
    justify-content:space-between;
    margin-bottom:25px;
    font-size:14px;
}

.options a{
    color:#FF6B00;
    text-decoration:none;
}

.login-btn{
    width:100%;
    border:none;
    background:#FF6B00;
    color:white;
    padding:15px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin-bottom:25px;
}

.login-btn:hover{
    background:#ff7f24;
}

.social{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.social button{
    padding:14px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
}

.google{
    background:white;
}

.facebook{
    background:#1877F2;
    color:white;
}

.signup{
    text-align:center;
    margin-top:25px;
}

.signup a{
    color:#FF6B00;
    text-decoration:none;
    font-weight:bold;
}

@media(max-width:768px){

    nav{
        flex-direction:column;
        gap:20px;
    }

    nav ul{
        flex-wrap:wrap;
        justify-content:center;
    }

    .login-box{
        width:100%;
        max-width:420px;
    }
}

</style>
</head>

<body>

<nav>

<div class="logo">
<i class="fa-solid fa-car"></i>
DriveX
</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="vehicles.html">Cars</a></li>
<li><a href="sell-vehicle.html">Sell</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="register.html">Register</a></li>
</ul>

</nav>

<section class="login-section">

<div class="login-box">

<h1>Welcome Back</h1>
<p>Login to your DriveX account</p>

<form>

<div class="input-box">
<label>Email Address</label>
<input type="email"
placeholder="Enter your email"
required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password"
placeholder="Enter your password"
required>
</div>

<div class="options">
<label>
<input type="checkbox">
 Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button type="submit"
class="login-btn">
Login
</button>

</form>

<div class="social">

<button class="google">
<i class="fab fa-google"></i>
 Google
</button>

<button class="facebook">
<i class="fab fa-facebook-f"></i>
 Facebook
</button>

</div>

<div class="signup">
Don't have an account?
<a href="register.html">
Create Account
</a>
</div>

</div>

</section>

<script>

document.querySelector("form")
.addEventListener("submit",function(e){

    e.preventDefault();

    alert("Login Successful!");

    window.location.href="profile.html";
});

</script>

</body>
</html>
